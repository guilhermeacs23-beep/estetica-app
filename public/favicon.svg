<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fundo escuro arredondado -->
  <rect width="32" height="32" rx="7" fill="#0a0e1a"/>

  <!-- Brilho sutil no topo -->
  <rect width="32" height="16" rx="7" fill="url(#topglow)"/>
  <defs>
    <linearGradient id="topglow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a4a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vgrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="60%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- V geométrico principal -->
  <g filter="url(#glow)">
    <!-- Perna esquerda do V -->
    <polygon points="4,7 9,7 16,23 13,23" fill="url(#vgrad)"/>
    <!-- Perna direita do V -->
    <polygon points="28,7 23,7 16,23 19,23" fill="url(#vgrad)"/>
    <!-- Highlight superior esquerdo -->
    <polygon points="4,7 7,7 10,13 8,13" fill="#7dd3fc" opacity="0.6"/>
    <!-- Highlight superior direito -->
    <polygon points="28,7 25,7 22,13 24,13" fill="#7dd3fc" opacity="0.6"/>
  </g>

  <!-- Ponto de brilho na ponta do V -->
  <circle cx="16" cy="22" r="1.2" fill="#38bdf8" opacity="0.9"/>
</svg>
